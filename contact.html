<section>
<div class="container contact-wrapper">

<div>
<h2>We would love to hear from you</h2>
<form id="contactForm">

<div id="formStatus" class="form-status"></div>

<input type="text" id="name" placeholder="Your Name" required>
<div class="error"></div>

<input type="email" id="email" placeholder="Your Email" required>
<div class="error"></div>

<input type="text" id="phone" placeholder="Phone Number" required>
<div class="error"></div>

<textarea id="message" rows="5" placeholder="Your Message"></textarea>

<button type="submit" id="submitBtn" class="btn btn-primary">
Submit
</button>

</form>
</div>

<div>
<h2>Reach us</h2>
<p><i class="fa-solid fa-location-dot"></i> B2/8, SBM Layout, Anthivadi, Hosur, Tamil Nadu 635109</p>
<p><i class="fa-solid fa-envelope"></i> info@sakthidentalclinic.in</p>
<p><i class="fa-solid fa-phone"></i> +91 9862890897 / +91 9363298118</p>
<p><i class="fa-solid fa-clock"></i> <strong>Sunday to Saturday: 9am to 7pm</strong></p>
</div>

</div>
</section>
